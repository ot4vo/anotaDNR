<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Anotações</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Meus Acordos</h1>

<div id="exemplo">
  <text>Exemplo:</text>
  <span class="ex-parte" data-tooltip="Data do acordo — opcional, padrão é hoje">(01/01)</span>
  <span class="ex-parte" data-tooltip="Valor do acordo">R$100</span>
  <span class="ex-parte" data-tooltip="Forma de pagamento: pix, boleto, deb, parc...">pix</span>
  <span class="ex-parte" data-tooltip="Parcelas — opcional">12x</span>
  <span class="ex-parte" data-tooltip="Data de vencimento">01/01</span>
  <span class="ex-parte" data-tooltip="ID do cliente — mínimo 6 dígitos">0000000</span>
  <span class="ex-parte" data-tooltip="Tipo de cliente — opcional: mer, point, cons, cartão">client</span>
</div>

  <div id="barraAcoes">
    <input type="text" id="inputPrincipal" placeholder="Adicionar ou buscar por ID...">
    <button type="button" id="btnBuscar">🔍</button>
    <button type="button" id="btnAdicionar">ADICIONAR</button>
    
  </div>

  <div id="resumoGeral"></div>
  <div id="tabelaNotas"></div>

  <script src="script.js"></script>
</body>
</html>
